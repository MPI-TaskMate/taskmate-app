name: Advanced CI/CD Pipeline

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

jobs:
  lint:
    name: Lint Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.6

      - run: npm ci
        working-directory: frontend

      - run: npm run lint
        working-directory: frontend

  test:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - run: dotnet restore backend/TaskMate.Tests

      - run: dotnet test backend/TaskMate.Tests

  build:
    name: Build App
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      # Frontend
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
        working-directory: frontend

      - run: npm run build
        working-directory: frontend

      # Backend
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - run: dotnet restore backend/TaskMate.API

      - run: dotnet build backend/TaskMate.API --configuration Release

  deploy:
    name: Fake Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    env:
      CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}
      JWT_KEY: ${{ secrets.JWT_KEY }}
      DB_SA_PASSWORD: ${{ secrets.DB_SA_PASSWORD }}

    steps:
      - name: Validate required secrets
        run: |
          test -n "$CONNECTION_STRING"
          test -n "$JWT_KEY"
          test -n "$DB_SA_PASSWORD"

      - name: Simulate deployment
        run: |
          echo "Deployment triggered (fake). Real deploy in task #8."